<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 মহাবিশ্ব এক্সপ্লোরার | Universe Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #0a0a23, #000);
            color: white;
            overflow: hidden;
            height: 100vh;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 350px;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
        }
        
        button {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 12px 20px;
            margin: 5px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        
        #lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
        }
        
        .planet-popup {
            position: absolute;
            background: rgba(0,0,0,0.95);
            padding: 20px;
            border-radius: 15px;
            max-width: 300px;
            backdrop-filter: blur(20px);
            border: 2px solid #4ecdc4;
            z-index: 2000;
            display: none;
            animation: popupSlide 0.5s ease;
        }
        
        @keyframes popupSlide {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            z-index: 3000;
        }
        
        #vr-button {
            background: linear-gradient(45deg, #667eea, #764ba2) !important;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="info-panel">
            <h2 id="title">🌌 মহাবিশ্ব এক্সপ্লোরার</h2>
            <p id="info-text">মহাকাশে চলাফেরা করুন! মাউস দিয়ে ঘুরান, স্ক্রল করে জুম করুন</p>
            <div id="current-obj">বর্তমানে: মহাকাশ</div>
        </div>
        
        <button id="lang-toggle">🇧🇩 EN</button>
        
        <div id="controls">
            <button onclick="resetView()">🔄 রিসেট</button>
            <button onclick="toggleSound()">🔊 সাউন্ড</button>
            <button onclick="toggleGalaxy()">🌌 গ্যালাক্সি</button>
            <button id="vr-button" onclick="enterVR()">🕶️ VR মোড</button>
        </div>
        
        <div id="loading" class="loading">Loading Universe... 🌌</div>
    </div>

    <!-- Planet Info Popup -->
    <div id="planet-popup" class="planet-popup">
        <h3 id="popup-title"></h3>
        <img id="popup-image" style="width:100%; border-radius:10px; margin:10px 0;">
        <p id="popup-info"></p>
        <div id="satellites"></div>
        <button onclick="closePopup()" style="background:#ff6b6b;">বন্ধ করুন</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // Language Support
        let isBengali = true;
        const translations = {
            bn: {
                title: "🌌 মহাবিশ্ব এক্সপ্লোরার",
                info: "মহাকাশে চলাফেরা করুন! মাউস দিয়ে ঘুরান, স্ক্রল করে জুম করুন",
                current: "বর্তমানে: ",
                earth: "পৃথিবী",
                moon: "চাঁদ",
                mars: "মঙ্গল",
                saturn: "শনি",
                jupiter: "বৃহস্পতি",
                ocean: "সমুদ্র",
                creatures: "সমুদ্র প্রাণী"
            },
            en: {
                title: "🌌 Universe Explorer",
                info: "Explore space! Rotate with mouse, zoom with scroll",
                current: "Currently: ",
                earth: "Earth",
                moon: "Moon",
                mars: "Mars",
                saturn: "Saturn",
                jupiter: "Jupiter",
                ocean: "Ocean",
                creatures: "Ocean Creatures"
            }
        };

        // Scene Setup
        let scene, camera, renderer, controls;
        let stars = [], planets = [], satellites = [], galaxies = [];
        let soundEnabled = true;
        let galaxyEffect = true;
        let currentZoomLevel = 0;

        // Audio Context
        let audioContext;
        let spaceMusic, zoomSound, planetSound;

        // Initialize
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0005);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000000);
            camera.position.set(0, 50, 200);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000011);
            document.getElementById('container').appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Create Universe
            createStars();
            createGalaxies();
            createSolarSystem();
            createEarthDetails();

            // Audio
            initAudio();

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('wheel', onMouseWheel);

            document.getElementById('loading').style.display = 'none';
            animate();
        }

        // Stars
        function createStars() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 50000;
            const positions = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 4000;
                positions[i + 1] = (Math.random() - 0.5) * 4000;
                positions[i + 2] = (Math.random() - 0.5) * 4000;
            }

            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 2 });
            stars.push(new THREE.Points(starGeometry, starMaterial));
            scene.add(stars[0]);
        }

        // Galaxies
        function createGalaxies() {
            for (let i = 0; i < 5; i++) {
                const galaxy = new THREE.Group();
                const galaxyStars = 2000;
                const positions = new Float32Array(galaxyStars * 3);

                for (let j = 0; j < galaxyStars * 3; j += 3) {
                    const radius = Math.random() * 100 + 50;
                    const angle = Math.random() * Math.PI * 2;
                    positions[j] = Math.cos(angle) * radius * (Math.random() * 0.5 + 0.5);
                    positions[j + 1] = (Math.random() - 0.5) * 20;
                    positions[j + 2] = Math.sin(angle) * radius * (Math.random() * 0.5 + 0.5);
                }

                const galaxyGeometry = new THREE.BufferGeometry();
                galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const galaxyMaterial = new THREE.PointsMaterial({ 
                    color: new THREE.Color().setHSL(0.6, 0.8, 0.5 + Math.random() * 0.5),
                    size: 1.5,
                    transparent: true,
                    opacity: 0.8
                });
                
                const galaxyPoints = new THREE.Points(galaxyGeometry, galaxyMaterial);
                galaxy.add(galaxyPoints);
                galaxy.position.set(
                    (Math.random() - 0.5) * 2000,
                    (Math.random() - 0.5) * 1000,
                    (Math.random() - 0.5) * 2000
                );
                scene.add(galaxy);
                galaxies.push(galaxy);
            }
        }

        // Solar System
        function createSolarSystem() {
            const sun = createSun();
            scene.add(sun);

            // Planets
            const planetsData = [
                { name: 'earth', radius: 3, distance: 40, color: 0x4a90e2, speed: 0.02 },
                { name: 'mars', radius: 2, distance: 60, color: 0xe74c3c, speed: 0.015 },
                { name: 'jupiter', radius: 8, distance: 100, color: 0xf39c12, speed: 0.008 },
                { name: 'saturn', radius: 7, distance: 140, color: 0xf1c40f, speed: 0.006 }
            ];

            planetsData.forEach(data => {
                const planet = createPlanet(data);
                planets.push(planet);
                scene.add(planet.mesh);
            });
        }

        function createSun() {
            const geometry = new THREE.SphereGeometry(10, 32, 32);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0xffff00,
                emissive: 0xffaa00
            });
            const sun = new THREE.Mesh(geometry, material);
            sun.position.set(0, 0, 0);
            return sun;
        }

        function createPlanet(data) {
            const geometry = new THREE.SphereGeometry(data.radius, 32, 32);
            const material = new THREE.MeshPhongMaterial({ color: data.color });
            const mesh = new THREE.Mesh(geometry, material);
            
            return {
                mesh,
                distance: data.distance,
                angle: Math.random() * Math.PI * 2,
                speed: data.speed,
                name: data.name,
                info: getPlanetInfo(data.name)
            };
        }

        // Earth Details (Most Advanced Feature)
        function createEarthDetails() {
            const earthIndex = planets.findIndex(p => p.name === 'earth');
            if (earthIndex !== -1) {
                const earth = planets[earthIndex];
                
                // Moon
                const moonGeometry = new THREE.SphereGeometry(0.8, 32, 32);
                const moonMaterial = new THREE.MeshPhongMaterial({ color: 0xcccccc });
                const moon = new THREE.Mesh(moonGeometry, moonMaterial);
                moon.position.set(6, 0, 0);
                earth.mesh.add(moon);
                
                // Satellites
                const satellitesData = [
                    { name: 'ISS', distance: 8, speed: 0.1 },
                    { name: 'Hubble', distance: 9, speed: 0.08 },
                    { name: 'Starlink-1', distance: 7.5, speed: 0.12 }
                ];

                satellitesData.forEach(satData => {
                    const satGeometry = new THREE.RingGeometry(0.1, 0.2, 8);
                    const satMaterial = new THREE.MeshBasicMaterial({ 
                        color: 0x00ff00, 
                        side: THREE.DoubleSide,
                        emissive: 0x004400
                    });
                    const satellite = new THREE.Mesh(satGeometry, satMaterial);
                    satellite.rotation.x = Math.PI / 2;
                    satellite.position.set(satData.distance, 0, 0);
                    satellite.userData = { name: satData.name, speed: satData.speed };
                    earth.mesh.add(satellite);
                    satellites.push(satellite);
                });

                // Ocean creatures (when zoomed in)
                earth.userData.hasOcean = true;
            }
        }

        // Planet Info
        function getPlanetInfo(name) {
            const info = {
                earth: {
                    bn: "🌍 পৃথিবী - আমাদের নীল গ্রহ। জল 71%, সবুজ ভূমি 29%।",
                    en: "🌍 Earth - Our blue planet. 71% water, 29% land."
                },
                mars: {
                    bn: "🔴 মঙ্গল - লাল গ্রহ। অক্সিজেনের পরিবর্তে CO2。",
                    en: "🔴 Mars - Red planet. CO2 instead of oxygen."
                },
                jupiter: {
                    bn: "🟠 বৃহস্পতি - সৌরজগতের সবচেয়ে বড় গ্রহ।",
                    en: "🟠 Jupiter - Largest planet in solar system."
                },
                saturn: {
                    bn: "💍 শনি - তারকার মতো রিং আছে!",
                    en: "💍 Saturn - Has beautiful rings!"
                }
            };
            return info[name] || { bn: "অজানা গ্রহ", en: "Unknown planet" };
        }

        // Audio
        function initAudio() {
            if (!soundEnabled) return;
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            // Simple space sounds
            playSpaceMusic();
        }

        function playSpaceMusic() {
            if (!soundEnabled || !audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(55, audioContext.currentTime);
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 2);
        }

        // Mouse Wheel Zoom
        function onMouseWheel(event) {
            currentZoomLevel += event.deltaY * 0.01;
            camera.position.multiplyScalar(1 + event.deltaY * 0.001);
            
            if (soundEnabled) {
                playZoomSound();
            }
            
            checkZoomLevel();
        }

        function playZoomSound() {
            if (!audioContext) return;
            const oscillator = audioContext.createOscillator();
            oscillator.connect(audioContext.destination);
            oscillator.frequency.setValueAtTime(200 + Math.random() * 100, audioContext.currentTime);
            oscillator.type = 'sine';
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        // Check Zoom Level for Details
        function checkZoomLevel() {
            const distance = camera.position.distanceTo(new THREE.Vector3());
            
            if (distance < 20) {
                showPlanetDetails();
            } else {
                hidePlanetDetails();
            }
        }

        function showPlanetDetails() {
            // Raycaster for planet detection
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(planets.map(p => p.mesh));
            
            if (intersects.length > 0) {
                const planet = planets.find(p => p.mesh === intersects[0].object);
                if (planet) {
                    showPlanetPopup(planet);
                }
            }
        }

        function showPlanetPopup(planet) {
            const popup = document.getElementById('planet-popup');
            const lang = isBengali ? 'bn' : 'en';
            
            document.getElementById('popup-title').textContent = planet.name.toUpperCase();
            document.getElementById('popup-info').textContent = planet.info[lang];
            
            // Satellites info
            const satInfo = document.getElementById('satellites');
            if (planet.name === 'earth') {
                satInfo.innerHTML = `
                    <div style
